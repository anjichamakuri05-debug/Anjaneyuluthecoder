<!DOCTYPE html>
<html>
<head>
    <title>Login Page</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url("1.jpg");   /* Keep image in same folder */
            background-size: cover;
            background-repeat: no-repeat;
            font-family: Arial;
        }

        .login-box {
            position: absolute;
            top: 100px;
            left: 250px;
            background-color: yellow;
            padding: 20px;
            width: 300px;
        }

        label {
            font-family: "Comic Sans MS";
            color: green;
            font-size: 20px;
        }

        input[type="text"],
        input[type="password"] {
            width: 180px;
            height: 22px;
        }
    </style>
</head>

<body>

<div class="login-box">

<form action="index.jsp" method="get">

<label>Login</label>
<input type="text" size="20" maxlength="20"><br><br><br>

<label>Password</label>
<input type="password" size="20" maxlength="20"><br><br><br>

<center>
<input type="submit" value="Submit">
<input type="reset">
</center>

</form>

</div>

</body>
</html>
