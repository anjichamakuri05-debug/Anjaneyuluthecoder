<!DOCTYPE html>
<html>
<head>
    <title>Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffe6f0, #fff5f8);
        }
        .container {
            margin: 60px auto;
            width: 80%;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        h2 {
            color: green;
            margin-bottom: 20px;
        }
        p {
            font-size: 18px;
            color: #333;
            line-height: 1.6;
        }
        .highlight {
            color: blue;
            font-weight: bold;
        }
        .btn {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #004080;
        }
    </style>

</head>

<body>

    <div class="container">
        <h2>Online Book Store Information</h2>

        <p>
            This is the <span class="highlight">online book store</span>
            developed by students of Swarnandhra College of Engineering and Technology.
            It contains book catalogue of various branches like
            <span class="highlight">CSE, IT, EEE, ECE, MECH, M.TECH</span>.
        </p>

        <button class="btn">Explore Books</button>
    </div>

</body>
</html>
